name: Update language.json

on:
  pull_request:
    types:
      - closed
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download language.json
        run: |
          mkdir -p assets/data
          curl -sS https://api.translate.zvo.cn/language.json -o assets/data/language.json
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_user_name: Cell[bot]
          commit_user_email: lrhx@users.noreply.github.com
          commit_author: Cell[bot] <lrhx@users.noreply.github.com>
          commit_message: 'chore(deps): update language.json data'
